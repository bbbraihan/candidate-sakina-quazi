services:

  ollama:
    image: ollama/ollama:latest
    container_name: sakina-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    container_name: sakina-ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "${CHAT_MODEL:-qwen2.5:7b-instruct}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    container_name: sakina-app
    ports:
      - "8501:8501"
    volumes:
      - chroma_data:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
      - ./reports:/app/reports
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_PATH=/app/chroma_db
      - CHAT_MODEL=${CHAT_MODEL:-qwen2.5:7b-instruct}
      - EMBED_MODEL=${EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      - WHISPER_MODEL=${WHISPER_MODEL:-base.en}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - TTS_RATE=${TTS_RATE:-175}
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  hf_cache:
